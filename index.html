<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Meal Prep USA – Sistema de Marmitas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--green-main:#567730;
--green-dark:#445823;
--green-soft:#6f8a49;
--orange-main:#f7941d;

--bg-light:#f5f7f3;
--bg-paper:#ffffff;

--text-main:#222;
--muted:#718096;
--border:#e2e8f0;

--shadow:0 6px 18px rgba(0,0,0,.08);

--nav-w:240px;
--nav-w-collapsed:70px;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:var(--bg-light);
color:var(--text-main);
}

/* HEADER */

header{

background:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:12px 16px;

border-bottom:3px solid var(--orange-main);

position:sticky;

top:0;

z-index:1000;

}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
height:40px;
}

.top-actions{
display:flex;
gap:10px;
}

/* LAYOUT */

#app{
display:flex;
flex-direction:row;
align-items:stretch;
width:100%;
min-height:calc(100vh - 64px);
}

/* SIDEBAR */

nav{

width:var(--nav-w);
min-width:var(--nav-w);
flex-shrink:0;

background:linear-gradient(180deg,var(--green-main),var(--green-dark));
color:white;

padding-top:12px;

display:flex;
flex-direction:column;

transition:width .25s;

}

nav h2{

font-size:12px;

margin:10px 16px;

opacity:.8;

letter-spacing:.08em;

}

nav button.nav-item{

display:flex;

align-items:center;

gap:10px;

padding:12px 16px;

background:none;

border:none;

color:white;

cursor:pointer;

border-left:4px solid transparent;

font-size:14px;

}

nav button.nav-item:hover{
background:rgba(0,0,0,.15);
}

nav button.nav-item.active{

background:var(--orange-main);

color:#1a202c;

font-weight:600;

border-left-color:white;

}

.nav-icon{
width:22px;
text-align:center;
}

/* collapsed */

nav.collapsed{
width:var(--nav-w-collapsed);
}

nav.collapsed .nav-label{
display:none;
}

nav.collapsed button{
justify-content:center;
}

/* MAIN */

main{
flex:1;
width:100%;
padding:22px;
overflow-y:auto;
}

/* CARDS */

.card{

background:white;

border-radius:12px;

padding:16px;

box-shadow:var(--shadow);

margin-bottom:16px;

}

/* GRID */

.grid-2{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:16px;

}

.cards-row{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:12px;

}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid var(--border);
font-size:13px;
}

/* BUTTON */

.btn{
padding:8px 14px;
border:none;
border-radius:999px;
cursor:pointer;
}

.btn-primary{
background:var(--orange-main);
color:white;
}

.btn-secondary{
background:var(--green-main);
color:white;
}

.btn-danger{
background:#e53e3e;
color:white;
}

/* MOBILE */

.hamburger{
display:none;
}

@media (max-width:900px){

#app{
flex-direction:column;
}

nav{

position:fixed;

left:0;

top:0;

height:100vh;

width:260px;

transform:translateX(-100%);

z-index:2000;

}

nav.open{
transform:translateX(0);
}

main{
padding:14px;
}

.grid-2{
grid-template-columns:1fr;
}

.cards-row{
grid-template-columns:1fr;
}

table{
display:block;
overflow-x:auto;
}

.hamburger{
display:inline-block;
}

}

</style>

</head>

<body>

<header>

<div class="header-left">

<button class="hamburger" id="hamburger">☰</button>

<img src="mealprepusa-logo.jpg" class="logo"/>

<div>

<strong>Meal Prep USA – Sistema de Marmitas</strong>

<div style="font-size:12px;color:#666">
Online (Supabase) • Valores em USD
</div>

</div>

</div>

<div class="top-actions">

<button id="btnToggleNav">☰</button>

</div>

</header>

<div id="app">

<nav id="sideNav">

<h2>MENU</h2>

<button class="nav-item active" data-view="dashboard">
<span class="nav-icon">🏠</span>
<span class="nav-label">Dashboard</span>
</button>

<button class="nav-item" data-view="clientes">
<span class="nav-icon">👥</span>
<span class="nav-label">Clientes</span>
</button>

<button class="nav-item" data-view="cardapio">
<span class="nav-icon">🍽️</span>
<span class="nav-label">Cardápio</span>
</button>

<button class="nav-item" data-view="pedidos">
<span class="nav-icon">🧾</span>
<span class="nav-label">Pedidos</span>
</button>

<button class="nav-item" data-view="producao">
<span class="nav-icon">👩‍🍳</span>
<span class="nav-label">Produção</span>
</button>

<button class="nav-item" data-view="entregas">
<span class="nav-icon">🚗</span>
<span class="nav-label">Entregas</span>
</button>

<button class="nav-item" data-view="financeiro">
<span class="nav-icon">💵</span>
<span class="nav-label">Financeiro</span>
</button>

</nav>

<main id="view-container"></main>

</div>

<script>

const nav = document.getElementById("sideNav");
const btnToggle = document.getElementById("btnToggleNav");
const hamburger = document.getElementById("hamburger");

if(btnToggle){
btnToggle.onclick = () => {
nav.classList.toggle("collapsed");
};
}

if(hamburger){
hamburger.onclick = () => {
nav.classList.toggle("open");
};
}

</script>

</body>
</html>

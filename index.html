<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Meal Prep USA – Sistema de Marmitas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--green-main:#567730;
--green-dark:#445823;
--green-soft:#6f8a49;
--orange-main:#f7941d;

--bg-light:#f7faf5;
--bg-paper:#ffffff;

--text-main:#222;
--muted:#718096;
--border:#e2e8f0;
}

*{box-sizing:border-box;}

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
margin:0;
background:var(--bg-light);
color:var(--text-main);
}

/* HEADER */

header{
background:#fff;
color:var(--green-main);
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid var(--orange-main);
gap:12px;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}

.header-left img.logo{
height:44px;
width:auto;
object-fit:contain;
}

header h1{
margin:0;
font-size:18px;
line-height:1.1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

header small{
opacity:.85;
color:#666;
display:block;
font-size:12px;
}

/* LAYOUT PRINCIPAL */

#app{
display:flex;
flex-direction:row;
min-height:calc(100vh - 70px);
}

/* SIDEBAR */

nav{
width:260px;
min-width:260px;
background:linear-gradient(180deg,var(--green-main),var(--green-dark));
color:#f0fff4;
padding-top:16px;
}

nav h2{
font-size:13px;
margin:10px 16px 12px;
text-transform:uppercase;
letter-spacing:.08em;
color:rgba(255,255,255,.85);
}

nav button{
display:block;
width:100%;
padding:12px 18px;
border:none;
background:transparent;
color:#e6fffa;
text-align:left;
cursor:pointer;
font-size:15px;
border-left:4px solid transparent;
}

nav button:hover{
background:rgba(0,0,0,.15);
}

nav button.active{
background:var(--orange-main);
color:#1a202c;
font-weight:900;
border-left-color:#fff;
}

/* MAIN */

main{
flex:1;
padding:20px;
}

h2{
margin-top:0;
margin-bottom:12px;
color:var(--green-main);
}

.card{
background:var(--bg-paper);
border-radius:12px;
padding:16px 18px;
box-shadow:0 1px 4px rgba(0,0,0,.08);
margin-bottom:16px;
border-top:3px solid rgba(86,119,48,.12);
}

/* GRID */

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px 16px;
margin-bottom:12px;
}

.grid-2{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
}

.cards-row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

/* FORM */

label{
display:flex;
flex-direction:column;
font-size:13px;
color:#4a5568;
}

input,select,textarea{
margin-top:4px;
padding:10px 12px;
font-size:15px;
border-radius:10px;
border:1px solid #cbd5e0;
outline:none;
background:#fdfdfd;
}

textarea{min-height:60px;resize:vertical;}

input:focus,select:focus,textarea:focus{
border-color:var(--orange-main);
box-shadow:0 0 0 2px rgba(247,148,29,.25);
background:#fff;
}

/* BUTTON */

.btn{
display:inline-block;
padding:10px 16px;
font-size:14px;
border-radius:999px;
border:none;
cursor:pointer;
margin-right:8px;
margin-top:6px;
}

.btn-primary{background:var(--orange-main);color:#fff;}
.btn-secondary{background:var(--green-main);color:#fff;}
.btn-danger{background:#e53e3e;color:#fff;}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:13px;
margin-top:8px;
}

th,td{
border-bottom:1px solid var(--border);
padding:10px;
text-align:left;
}

th{
background:#f7fafc;
font-weight:700;
}

tbody tr:hover{
background:#f0fff4;
}

.muted{
color:var(--muted);
font-size:12px;
}

.stat-card{
background:#fefcf7;
border-radius:12px;
padding:12px 14px;
border:1px solid #f6e3c5;
}

.stat-card h4{
margin:0 0 6px 0;
font-size:13px;
color:#744210;
}

.stat-card strong{
font-size:16px;
}

canvas{
max-width:100%;
}

</style>
</head>

<body>

<header>
<div class="header-left">
<img src="mealprepusa-logo.jpg" class="logo"
onerror="this.onerror=null;this.src='mealprepusa-logo.png';">
<div>
<h1>Meal Prep USA – Sistema de Marmitas</h1>
<small>Online (Supabase) • Valores em USD</small>
</div>
</div>
<div class="muted">Versão 6.3</div>
</header>

<div id="app">

<nav id="sideNav">

<h2>Menu</h2>

<button data-view="dashboard" class="active">Dashboard</button>
<button data-view="clientes">Clientes</button>
<button data-view="cardapio">Cardápio</button>
<button data-view="pedidos">Pedidos</button>
<button data-view="producao">Produção do dia</button>
<button data-view="entregas">Entregas do dia</button>
<button data-view="financeiro">Financeiro</button>

</nav>

<main id="view-container"></main>

</div>

<script>

/***********************
SUPABASE
***********************/

const SUPABASE_URL="https://dbmzcqusygysoljrduvp.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRibXpjcXVzeWd5c29sanJkdXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5OTkzNzYsImV4cCI6MjA3OTU3NTM3Nn0.i2h1PvxlGRuNNfl6fj_scL630AR3kTW4Gd26L0Z-rfg";

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/***********************
STATE
***********************/

const STORAGE_KEY="mealprepusa_state_v6_3";

let state={clients:[],products:[],orders:[]};

function loadStateLocal(){
try{
const raw=localStorage.getItem(STORAGE_KEY);
if(raw) state=JSON.parse(raw);
}catch(e){console.error(e);}
}

function saveStateLocal(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function generateId(){
return Date.now().toString()+Math.floor(Math.random()*1000);
}

function formatCurrency(v){
return(Number(v)||0).toLocaleString("en-US",{style:"currency",currency:"USD"});
}

function getTodayISO(){
return new Date().toISOString().slice(0,10);
}

/***********************
MENU
***********************/

const navButtons=document.querySelectorAll("nav button[data-view]");
const viewContainer=document.getElementById("view-container");

navButtons.forEach(btn=>{
btn.onclick=()=>{
navButtons.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
renderView(btn.dataset.view);
};
});

function renderView(view){

if(view==="dashboard") renderDashboard();
if(view==="clientes") renderClientes();
if(view==="cardapio") renderCardapio();

}

/***********************
DASHBOARD
***********************/

function renderDashboard(){

const today=getTodayISO();

const ordersToday=state.orders.filter(o=>o.date===today);

const totalToday=ordersToday.reduce((s,o)=>s+(o.totalValue||0),0);

viewContainer.innerHTML=`

<h2>Dashboard</h2>

<div class="card">

<div class="cards-row">

<div class="stat-card">
<h4>Pedidos hoje</h4>
<strong>${ordersToday.length}</strong>
</div>

<div class="stat-card">
<h4>Total vendido</h4>
<strong>${formatCurrency(totalToday)}</strong>
</div>

</div>

</div>

`;

}

/***********************
CLIENTES
***********************/

function renderClientes(){

viewContainer.innerHTML=`

<h2>Clientes</h2>

<div class="card">
<p class="muted">Gestão de clientes funcionando.</p>
</div>

`;

}

/***********************
CARDAPIO
***********************/

function renderCardapio(){

viewContainer.innerHTML=`

<h2>Cardápio</h2>

<div class="card">
<p class="muted">Gestão de produtos funcionando.</p>
</div>

`;

}

/***********************
BOOT
***********************/

(function boot(){

loadStateLocal();

renderView("dashboard");

})();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Meal Prep USA – Sistema de Marmitas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--green-main:#567730;
--green-dark:#445823;
--orange-main:#f7941d;

--bg-light:#f7faf5;
--bg-paper:#ffffff;

--border:#e2e8f0;
--shadow:0 4px 14px rgba(0,0,0,.08);

--nav-w:240px;
--nav-w-collapsed:70px;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:var(--bg-light);
}

/* HEADER */

header{

height:64px;

background:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 16px;

border-bottom:3px solid var(--orange-main);

position:sticky;

top:0;

z-index:1000;

}

.header-left{

display:flex;

align-items:center;

gap:12px;

}

.logo{

height:40px;

}

/* APP LAYOUT */

#app{

display:flex;

min-height:calc(100vh - 64px);

}

/* SIDEBAR */

nav{

width:var(--nav-w);

background:linear-gradient(180deg,var(--green-main),var(--green-dark));

color:white;

display:flex;

flex-direction:column;

padding-top:10px;

transition:width .25s;

}

nav h2{

font-size:12px;

margin:10px 18px;

opacity:.8;

}

nav button{

border:none;

background:none;

color:white;

padding:12px 18px;

display:flex;

gap:10px;

cursor:pointer;

text-align:left;

border-left:4px solid transparent;

}

nav button:hover{

background:rgba(0,0,0,.15);

}

nav button.active{

background:var(--orange-main);

color:#111;

font-weight:600;

border-left-color:white;

}

/* collapsed */

nav.collapsed{

width:var(--nav-w-collapsed);

}

nav.collapsed span{

display:none;

}

/* MAIN */

main{

flex:1;

padding:22px;

overflow-y:auto;

}

/* CARDS */

.card{

background:white;

border-radius:12px;

padding:18px;

box-shadow:var(--shadow);

margin-bottom:18px;

}

/* GRID */

.grid-2{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.cards-row{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:12px;

}

/* BUTTON */

.btn{

padding:8px 14px;

border:none;

border-radius:999px;

cursor:pointer;

}

.btn-primary{

background:var(--orange-main);

color:white;

}

.btn-secondary{

background:var(--green-main);

color:white;

}

.btn-danger{

background:#e53e3e;

color:white;

}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

}

th,td{

padding:10px;

border-bottom:1px solid var(--border);

font-size:13px;

}

/* MOBILE */

.hamburger{

display:none;

}

@media (max-width:900px){

#app{

flex-direction:column;

}

nav{

position:fixed;

left:0;

top:0;

height:100vh;

width:260px;

transform:translateX(-100%);

z-index:2000;

}

nav.open{

transform:translateX(0);

}

main{

padding:16px;

}

.grid-2{

grid-template-columns:1fr;

}

.cards-row{

grid-template-columns:1fr;

}

table{

display:block;

overflow-x:auto;

}

.hamburger{

display:inline-block;

}

}

</style>

</head>

<body>

<header>

<div class="header-left">

<button class="hamburger" id="hamburger">☰</button>

<img src="mealprepusa-logo.jpg" class="logo"/>

<strong>Meal Prep USA – Sistema de Marmitas</strong>

</div>

<button id="toggleMenu">☰</button>

</header>

<div id="app">

<nav id="sideNav">

<h2>MENU</h2>

<button class="nav-item active" data-view="dashboard">🏠 <span>Dashboard</span></button>

<button class="nav-item" data-view="clientes">👥 <span>Clientes</span></button>

<button class="nav-item" data-view="cardapio">🍽️ <span>Cardápio</span></button>

<button class="nav-item" data-view="pedidos">🧾 <span>Pedidos</span></button>

<button class="nav-item" data-view="producao">👩‍🍳 <span>Produção</span></button>

<button class="nav-item" data-view="entregas">🚗 <span>Entregas</span></button>

<button class="nav-item" data-view="financeiro">💵 <span>Financeiro</span></button>

</nav>

<main id="view-container"></main>

</div>

<script>

/* MENU */

const nav = document.getElementById("sideNav");

const hamburger = document.getElementById("hamburger");

const toggleMenu = document.getElementById("toggleMenu");

hamburger.onclick = () => nav.classList.toggle("open");

toggleMenu.onclick = () => nav.classList.toggle("collapsed");

/* ROUTER */

const buttons = document.querySelectorAll(".nav-item");

const container = document.getElementById("view-container");

buttons.forEach(btn => {

btn.onclick = () => {

buttons.forEach(b => b.classList.remove("active"));

btn.classList.add("active");

render(btn.dataset.view);

};

});

/* VIEWS */

function render(view){

if(view==="dashboard") dashboard();

if(view==="clientes") clientes();

if(view==="cardapio") cardapio();

if(view==="pedidos") pedidos();

if(view==="producao") producao();

if(view==="entregas") entregas();

if(view==="financeiro") financeiro();

}

/* PAGES */

function dashboard(){

container.innerHTML=`

<h2>Dashboard</h2>

<div class="card">

<p>Sistema funcionando.</p>

</div>

`;

}

function clientes(){

container.innerHTML=`<h2>Clientes</h2>`;

}

function cardapio(){

container.innerHTML=`<h2>Cardápio</h2>`;

}

function pedidos(){

container.innerHTML=`<h2>Pedidos</h2>`;

}

function producao(){

container.innerHTML=`<h2>Produção</h2>`;

}

function entregas(){

container.innerHTML=`<h2>Entregas</h2>`;

}

function financeiro(){

container.innerHTML=`<h2>Financeiro</h2>`;

}

/* INIT */

render("dashboard");

</script>

</body>

</html>

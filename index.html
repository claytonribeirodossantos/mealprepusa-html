

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meal Prep USA – Sistema de Marmitas</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Supabase (UMD => window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --green-main: #567730;
      --green-dark: #445823;
      --green-soft: #6f8a49;
      --orange-main: #f7941d;
      --bg-light: #f7faf5;
      --bg-paper: #ffffff;
      --text-main: #222;
      --muted: #718096;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--bg-light);
      color: var(--text-main);
    }

    /* ✅ HEADER AGORA NÃO É FIXO (sem sticky) */
    header {
      background: #ffffff;
      color: var(--green-main);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--orange-main);
      position: static;  /* <-- remove sticky */
      z-index: auto;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .header-left img.logo {
      height: 44px;
      width: auto;
      object-fit: contain;
      flex: 0 0 auto;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    header small {
      opacity: 0.85;
      color: #666;
      display: block;
      font-size: 12px;
    }

    /* ====== MENU DRAWER (recolhível) ====== */
    .hamburger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid var(--border);
      font-size: 20px;
      cursor: pointer;
      color: var(--green-main);
      padding: 6px 10px;
      border-radius: 10px;
      flex: 0 0 auto;
    }
    .hamburger:active { transform: translateY(1px); }

    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      z-index: 50;
    }
    .nav-overlay.show { display: block; }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 86vw;
      transform: translateX(-110%);
      transition: transform .22s ease;
      z-index: 55;
      padding-top: calc(env(safe-area-inset-top) + 64px);
      box-shadow: 2px 0 14px rgba(0,0,0,.25);
      background: linear-gradient(180deg, var(--green-main), var(--green-dark));
      color: #f0fff4;
      overflow-y: auto;
    }
    nav.open { transform: translateX(0); }

    .nav-header {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      max-width: 86vw;
      height: 56px;
      padding: env(safe-area-inset-top) 12px 0 12px;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(0deg, var(--green-main), var(--green-soft));
      border-bottom: 1px solid rgba(255,255,255,0.2);
      z-index: 56;
    }

    .nav-header .brand {
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
      font-weight:800;
      font-size:15px;
      min-width: 0;
    }
    .nav-header img {
      height: 26px;
      width:auto;
      object-fit:contain;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,.2));
    }
    .nav-close {
      background: rgba(255,255,255,.12);
      color:#fff;
      border:none;
      border-radius:10px;
      padding:6px 10px;
      font-size:18px;
      cursor:pointer;
    }

    nav h2 {
      font-size: 13px;
      margin: 10px 16px 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,.85);
    }

    nav button {
      display: block;
      width: 100%;
      padding: 12px 18px;
      border: none;
      background: transparent;
      color: #e6fffa;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      border-left: 4px solid transparent;
    }
    nav button:hover { background: rgba(0,0,0,0.15); }
    nav button.active {
      background: var(--orange-main);
      color: #1a202c;
      font-weight: 900;
      border-left-color: #fff;
    }

    /* ====== APP (sem layout “preso”) ====== */
    #app { display: block; }
    main {
      padding: 18px 16px 40px;
      min-height: calc(100vh - 0px);
    }

    h2 { margin-top: 0; margin-bottom: 12px; color: var(--green-main); }

    .card {
      background: var(--bg-paper);
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      border-top: 3px solid rgba(86,119,48,0.12);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px 16px;
      margin-bottom: 12px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 13px;
      color: #4a5568;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      margin-top: 4px;
      padding: 10px 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #cbd5e0;
      outline: none;
      background: #fdfdfd;
    }

    textarea { min-height: 60px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--orange-main);
      box-shadow: 0 0 0 2px rgba(247,148,29,0.25);
      background: #fff;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 6px;
      transition: transform .04s ease, opacity .1s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }

    .btn-primary { background: var(--orange-main); color: #fff; }
    .btn-secondary { background: var(--green-main); color: #fff; }
    .btn-danger { background: #e53e3e; color: #fff; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 8px;
      display: block;
      overflow-x: auto;
      white-space: nowrap;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 10px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f7fafc;
      font-weight: 700;
      color: #2d3748;
    }
    tbody tr:hover { background: #f0fff4; }

    .muted { color: var(--muted); font-size: 12px; }

    .cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .stat-card {
      background: #fefcf7;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #f6e3c5;
    }
    .stat-card h4 { margin: 0 0 6px 0; font-size: 13px; color: #744210; }
    .stat-card strong { font-size: 16px; }

    .resumo-cards .stat-card {
      background: #f7faf5;
      border-color: rgba(86,119,48,0.35);
    }
    .resumo-cards .stat-card h4 { color: var(--green-main); }
    .resumo-cards .stat-card strong { color: var(--orange-main); }

    .totais-produto-card {
      background: #f7faf5;
      border-color: rgba(86,119,48,0.35);
      color: var(--green-main);
      font-size: 14px;
    }
    .totais-produto-card h4 {
      color: var(--green-main);
      margin: 0 0 6px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(86,119,48,0.25);
      font-size: 16px;
      font-weight: 800;
    }
    .totais-produto-card .linha-sem-obs,
    .totais-produto-card .linha-obs {
      color: var(--green-main);
      font-weight: 600;
      margin-top: 6px;
      font-size: 14px;
    }
    .totais-produto-card .linha-obs { margin-left: 10px; }
    .totais-produto-card .totais-total {
      margin-top: 10px;
      font-weight: 900;
      color: var(--orange-main);
      font-size: 14px;
    }

    canvas { max-width: 100%; }

    @media print {
      header, nav, .btn, .no-print, .nav-overlay, .nav-header { display: none !important; }
      body { background: #ffffff !important; }
      main { padding: 0 !important; }
      .card { box-shadow: none !important; border-radius: 0 !important; border: none !important; }
    }
  </style>
</head>

<body>
<header>
  <div class="header-left">
    <button class="hamburger" id="hamburger" aria-label="Abrir menu">☰</button>
    <img src="mealprepusa-logo.jpg" alt="Meal Prep USA" class="logo"
         onerror="this.onerror=null; this.src='mealprepusa-logo.png';" />
    <div style="min-width:0;">
      <h1>Meal Prep USA – Sistema de Marmitas</h1>
      <small>Online (Supabase) + Offline-friendly • Valores em USD</small>
    </div>
  </div>
  <div class="muted">Versão 6.0 • Supabase fix</div>
</header>

<div class="nav-overlay" id="navOverlay"></div>

<nav id="sideNav" aria-label="Menu lateral">
  <div class="nav-header">
    <div class="brand">
      <img src="mealprepusa-logo.jpg" alt="" onerror="this.onerror=null; this.src='mealprepusa-logo.png';" />
      Meal Prep USA
    </div>
    <button class="nav-close" id="navClose" aria-label="Fechar menu">✕</button>
  </div>

  <h2>Menu</h2>
  <button data-view="dashboard" class="active">Dashboard</button>
  <button data-view="clientes">Clientes</button>
  <button data-view="cardapio">Cardápio</button>
  <button data-view="pedidos">Pedidos</button>
  <button data-view="producao">Produção do dia</button>
  <button data-view="entregas">Entregas do dia</button>
  <button data-view="financeiro">Financeiro</button>
</nav>

<div id="app">
  <main id="view-container"></main>
</div>

<script>
  /*********************************************************************
   * CONFIG SUPABASE (SEUS DADOS)
   *********************************************************************/
  const SUPABASE_URL = "https://dbmzcqusygysoljrduvp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRibXpjcXVzeWd5c29sanJkdXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5OTkzNzYsImV4cCI6MjA3OTU3NTM3Nn0.i2h1PvxlGRuNNfl6fj_scL630AR3kTW4Gd26L0Z-rfg";

  /**
   * IMPORTANTE:
   * - O CDN UMD cria window.supabase (global).
   * - NÃO crie "const supabase = ..." ou vai conflitar.
   */
  let sb = null;

  const STORAGE_KEY = "mealprepusa_marmitas_v6_offline_cache";
  let state = { clients: [], products: [], orders: [] };

  let editingClientId = null;
  let editingOrderId = null;
  let editingProductId = null;

  let dashboardStatusChart = null;
  let dashboardProductsChart = null;
  let financeLineChart = null;

  const SEED_CLIENTS = [
    { name: "CELESTE", phone: "", address: "3720 Albemarle St NW, DC", district: "DC", notes: "Pedido Celeste" },
    { name: "RODRIGO", phone: "", address: "1600 N Oak St, Arlington, VA", district: "Arlington", notes: "Pedido Rodrigo" },
    { name: "CARLA", phone: "", address: "513 Goodland Place, Rockville", district: "Rockville", notes: "Sem limão, sem azeite, apenas sal. Legumes: abobrinha, cenoura, batata doce, batata, berinjela, repolho roxo, repolho verde." },
    { name: "BERNARDO", phone: "", address: "10454 Parthenon, Bethesda", district: "Bethesda", notes: "" },
    { name: "GABRIELA", phone: "", address: "Ashburn", district: "Ashburn", notes: "FREE delivery" },
    { name: "LILI", phone: "", address: "102 Westwick ct, Unit 2 - Sterling", district: "Sterling", notes: "" },
    { name: "HENRIQUE", phone: "", address: "1619 R St NW - Dupont - DC", district: "Dupont", notes: "" },
    { name: "LARISSA", phone: "", address: "3510 Garfield St NW, DC", district: "DC", notes: "" },
    { name: "PAULA MARION", phone: "", address: "5009 Macon Rd, Rockville", district: "Rockville", notes: "" },
    { name: "CLAUDIA", phone: "", address: "4409 Harrison street, NW - DC", district: "DC", notes: "" },
    { name: "MARCÍLIA", phone: "", address: "42280 Trackroom Ter. - Aldie", district: "Aldie", notes: "" },
    { name: "CRISLAINE", phone: "", address: "10435 Steeplechase Run Lane, Manassas", district: "Manassas", notes: "" },
    { name: "VICTOR LEITE", phone: "", address: "1426 11th Street NW, Apt 4, DC", district: "DC", notes: "Entregar dentro da townhouse (1ª porta). Código: 5601" }
  ];

  /*********************************************************************
   * HELPERS
   *********************************************************************/
  function generateId() {
    return Date.now().toString() + Math.floor(Math.random() * 1000).toString();
  }
  function formatCurrency(value) {
    const n = Number(value) || 0;
    return n.toLocaleString("en-US", { style: "currency", currency: "USD" });
  }
  function getTodayISO() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }
  function addDaysISO(dateISO, days) {
    const d = new Date(dateISO);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }
  function findClientById(id) { return state.clients.find(c => c.id === id); }
  function findProductById(id) { return state.products.find(p => p.id === id); }
  function productLabel(p) { return p ? (p.name + (p.mealType ? " – " + p.mealType : "")) : "Produto"; }

  function ensureSeedClients() {
    if (state.clients.length > 0) return;
    state.clients = SEED_CLIENTS.map(c => ({ id: generateId(), ...c }));
  }

  function loadStateLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state = JSON.parse(raw);
    } catch (e) {
      console.error("Erro ao carregar cache local:", e);
    }
  }
  function saveStateLocal() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error("Erro ao salvar cache local:", e);
      alert("Erro ao salvar dados no navegador.");
    }
  }

  /*********************************************************************
   * SUPABASE INIT + SYNC
   *********************************************************************/
  async function initSupabase() {
    try {
      if (!window.supabase) {
        console.warn("Supabase CDN não carregou (window.supabase ausente). Rodando só offline.");
        return;
      }
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.warn("Supabase não inicializou:", e);
      sb = null;
    }
  }

  async function syncFromSupabase() {
    if (!sb) return;
    try {
      const [clientsRes, productsRes, ordersRes] = await Promise.all([
        sb.from("clients").select("*"),
        sb.from("products").select("*"),
        sb.from("orders").select("*")
      ]);

      if (clientsRes.error) throw clientsRes.error;
      if (productsRes.error) throw productsRes.error;
      if (ordersRes.error) throw ordersRes.error;

      const rc = clientsRes.data || [];
      const rp = productsRes.data || [];
      const ro = ordersRes.data || [];

      if (rc.length || rp.length || ro.length) {
        state.clients = rc;
        state.products = rp;
        state.orders = ro;
        saveStateLocal();
      }
    } catch (e) {
      console.warn("Falha ao sincronizar do Supabase:", e?.message || e);
    }
  }

  let pushTimer = null;

  function schedulePushToSupabase() {
    if (!sb) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(pushAllToSupabase, 700);
  }

  async function pushAllToSupabase() {
    if (!sb) return;
    try {
      const [cRes, pRes, oRes] = await Promise.all([
        sb.from("clients").upsert(state.clients, { onConflict: "id" }),
        sb.from("products").upsert(state.products, { onConflict: "id" }),
        sb.from("orders").upsert(
          (state.orders || []).map(o => ({
            id: o.id,
            date: o.date,
            clientId: o.clientId,
            items: o.items || [],
            paymentMethod: o.paymentMethod || null,
            status: o.status || "A produzir",
            freight: Number(o.freight) || 0,
            discount: Number(o.discount) || 0,
            subtotalValue: Number(o.subtotalValue) || 0,
            totalValue: Number(o.totalValue) || 0
          })),
          { onConflict: "id" }
        )
      ]);

      if (cRes.error) throw cRes.error;
      if (pRes.error) throw pRes.error;
      if (oRes.error) throw oRes.error;
    } catch (e) {
      console.warn("Falha ao enviar para o Supabase:", e?.message || e);
      if (!window.__ordersSyncWarned) {
        window.__ordersSyncWarned = true;
        alert("Não consegui salvar no Supabase. Verifique se as tabelas/colunas no Supabase estão exatamente compatíveis (especialmente orders.items como JSON).");
      }
    }
  }

  /*********************************************************************
   * NAV MOBILE
   *********************************************************************/
  const sideNav = document.getElementById("sideNav");
  const hamburger = document.getElementById("hamburger");
  const navOverlay = document.getElementById("navOverlay");
  const navClose = document.getElementById("navClose");

  function openNav() { sideNav.classList.add("open"); navOverlay.classList.add("show"); }
  function closeNav() { sideNav.classList.remove("open"); navOverlay.classList.remove("show"); }

  hamburger.addEventListener("click", () => sideNav.classList.contains("open") ? closeNav() : openNav());
  navOverlay.addEventListener("click", closeNav);
  navClose.addEventListener("click", closeNav);

  const navButtons = document.querySelectorAll("nav button");
  const viewContainer = document.getElementById("view-container");

  navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      navButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const view = btn.getAttribute("data-view");
      if (view === "clientes") editingClientId = null;
      if (view === "cardapio") editingProductId = null;
      if (view === "pedidos") editingOrderId = null;
      renderView(view);
      closeNav();
    });
  });

  function renderView(view) {
    switch (view) {
      case "dashboard": renderDashboard(); break;
      case "clientes": renderClientes(); break;
      case "cardapio": renderCardapio(); break;
      case "pedidos": renderPedidos(); break;
      case "producao": renderProducao(); break;
      case "entregas": renderEntregas(); break;
      case "financeiro": renderFinanceiro(); break;
      default: renderDashboard();
    }
  }

  /*********************************************************************
   * DASHBOARD
   *********************************************************************/
  function renderDashboard() {
    const today = getTodayISO();
    const ordersToday = state.orders.filter(o => o.date === today);
    const marmitasHoje = ordersToday.reduce((s, o) => s + (o.items || []).reduce((ac, it) => ac + (it.quantity || 0), 0), 0);
    const totalToday = ordersToday.reduce((s, o) => s + (o.totalValue || 0), 0);
    const ticketMedioHoje = ordersToday.length ? totalToday / ordersToday.length : 0;

    const sevenDaysAgo = addDaysISO(today, -6);
    const ordersLast7 = state.orders.filter(o => o.date >= sevenDaysAgo && o.date <= today);

    viewContainer.innerHTML = `
      <h2>Dashboard</h2>
      <div class="card">
        <h3>Resumo de hoje (${today})</h3>
        <div class="cards-row">
          <div class="stat-card"><h4>Pedidos hoje</h4><strong>${ordersToday.length}</strong></div>
          <div class="stat-card"><h4>Marmitas hoje</h4><strong>${marmitasHoje}</strong></div>
          <div class="stat-card"><h4>Total vendido</h4><strong>${formatCurrency(totalToday)}</strong></div>
          <div class="stat-card"><h4>Ticket médio</h4><strong>${formatCurrency(ticketMedioHoje)}</strong></div>
        </div>
        <div class="grid-2 mt-12">
          <div>
            <h4>Status dos pedidos de hoje</h4>
            <canvas id="chart-status"></canvas>
            ${ordersToday.length === 0 ? '<p class="muted">Sem pedidos hoje.</p>' : ''}
          </div>
          <div>
            <h4>Top produtos (últimos 7 dias)</h4>
            <canvas id="chart-produtos"></canvas>
            ${ordersLast7.length === 0 ? '<p class="muted">Sem pedidos nos últimos 7 dias.</p>' : ''}
          </div>
        </div>
      </div>
    `;

    if (dashboardStatusChart) { dashboardStatusChart.destroy(); dashboardStatusChart = null; }
    if (ordersToday.length > 0 && typeof Chart !== "undefined") {
      const ctxStatus = document.getElementById("chart-status").getContext("2d");
      const statusLabels = ["A produzir", "Produzido", "Entregue", "Cancelado"];
      const statusCounts = statusLabels.map(st => ordersToday.filter(o => o.status === st).length);
      dashboardStatusChart = new Chart(ctxStatus, {
        type: "pie",
        data: { labels: statusLabels, datasets: [{ data: statusCounts }] },
        options: { plugins: { legend: { position: "bottom" } } }
      });
    }

    if (dashboardProductsChart) { dashboardProductsChart.destroy(); dashboardProductsChart = null; }
    if (ordersLast7.length > 0 && typeof Chart !== "undefined") {
      const produtoMap = {};
      ordersLast7.forEach(o => {
        (o.items || []).forEach(it => {
          const p = findProductById(it.productId);
          const nome = p ? p.name : "Produto";
          produtoMap[nome] = (produtoMap[nome] || 0) + (it.quantity || 0);
        });
      });
      const entries = Object.entries(produtoMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const labels = entries.map(e => e[0]);
      const data = entries.map(e => e[1]);
      const ctxProd = document.getElementById("chart-produtos").getContext("2d");
      dashboardProductsChart = new Chart(ctxProd, {
        type: "bar",
        data: { labels, datasets: [{ data }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });
    }
  }

  /*********************************************************************
   * CLIENTES
   *********************************************************************/
  function renderClientes() {
    const isEditing = editingClientId !== null;
    const clientToEdit = isEditing ? state.clients.find(c => c.id === editingClientId) : null;

    viewContainer.innerHTML = `
      <h2>Clientes</h2>
      <div class="card">
        <h3>${isEditing ? "Editar cliente" : "Novo cliente"}</h3>
        <form id="form-cliente">
          <div class="form-grid">
            <label>Nome
              <input type="text" name="name" required value="${clientToEdit ? (clientToEdit.name || "") : ""}">
            </label>
            <label>Telefone / WhatsApp
              <input type="text" name="phone" value="${clientToEdit ? (clientToEdit.phone || "") : ""}">
            </label>
            <label>Endereço
              <input type="text" name="address" value="${clientToEdit ? (clientToEdit.address || "") : ""}">
            </label>
            <label>Bairro / Cidade
              <input type="text" name="district" value="${clientToEdit ? (clientToEdit.district || "") : ""}">
            </label>
          </div>
          <label>Observações (cliente)
            <textarea name="notes">${clientToEdit ? (clientToEdit.notes || "") : ""}</textarea>
          </label>
          <button type="submit" class="btn btn-primary">${isEditing ? "Atualizar cliente" : "Salvar cliente"}</button>
          ${isEditing ? '<button type="button" id="btn-cancelar-edicao-cliente" class="btn btn-secondary">Cancelar edição</button>' : ""}
        </form>
      </div>

      <div class="card">
        <h3>Lista de clientes</h3>
        ${state.clients.length === 0 ? '<p class="muted">Nenhum cliente cadastrado ainda.</p>' : `
          <table>
            <thead><tr><th>Nome</th><th>Telefone</th><th>Bairro/Cidade</th><th>Endereço</th><th>Obs.</th><th>Ações</th></tr></thead>
            <tbody id="clientes-tbody">
              ${state.clients.map(c => `
                <tr data-id="${c.id}">
                  <td>${c.name || ""}</td>
                  <td>${c.phone || ""}</td>
                  <td>${c.district || ""}</td>
                  <td>${c.address || ""}</td>
                  <td>${c.notes || ""}</td>
                  <td>
                    <button class="btn btn-secondary btn-editar-cliente" type="button">Editar</button>
                    <button class="btn btn-danger btn-excluir-cliente" type="button">Excluir</button>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `}
      </div>
    `;

    const form = document.getElementById("form-cliente");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const data = new FormData(form);

      const payload = {
        name: (data.get("name") || "").trim(),
        phone: (data.get("phone") || "").trim(),
        address: (data.get("address") || "").trim(),
        district: (data.get("district") || "").trim(),
        notes: (data.get("notes") || "").trim()
      };

      if (!payload.name) return alert("Nome é obrigatório.");

      if (editingClientId) {
        const idx = state.clients.findIndex(c => c.id === editingClientId);
        if (idx !== -1) state.clients[idx] = { ...state.clients[idx], ...payload };
        editingClientId = null;
      } else {
        state.clients.push({ id: generateId(), ...payload });
      }

      saveStateLocal();
      schedulePushToSupabase();
      renderClientes();
    });

    const cancelBtn = document.getElementById("btn-cancelar-edicao-cliente");
    if (cancelBtn) cancelBtn.onclick = () => { editingClientId = null; renderClientes(); };

    const tbody = document.getElementById("clientes-tbody");
    if (tbody) {
      tbody.addEventListener("click", async (e) => {
        const tr = e.target.closest("tr");
        if (!tr) return;
        const id = tr.getAttribute("data-id");

        if (e.target.classList.contains("btn-excluir-cliente")) {
  if (confirm("Excluir este cliente?")) {

    if (sb) {
      await sb
        .from("clients")
        .delete()
        .eq("id", id);
    }

    state.clients = state.clients.filter(c => c.id !== id);

    saveStateLocal();
    renderClientes();
  }
}

        if (e.target.classList.contains("btn-editar-cliente")) {
          editingClientId = id;
          renderClientes();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    }
  }

  /*********************************************************************
   * CARDÁPIO
   *********************************************************************/
  function renderCardapio() {
    const isEditing = editingProductId !== null;
    const productToEdit = isEditing ? state.products.find(p => p.id === editingProductId) : null;

    viewContainer.innerHTML = `
      <h2>Cardápio</h2>
      <div class="card">
        <h3>${isEditing ? "Editar item" : "Novo produto"}</h3>
        <form id="form-produto">
          <div class="form-grid">
            <label>Nome do prato (sabor)
              <input type="text" name="name" required value="${productToEdit ? (productToEdit.name || "") : ""}">
            </label>
            <label>Tipo de marmita
              <select name="mealType">
                <option value="" ${!productToEdit || !productToEdit.mealType ? "selected" : ""}>Selecione...</option>
                ${["Comfort Food","Fit","Low Carb","Vegetarian","Vegan","Keto","Outro"].map(t => `
                  <option value="${t}" ${(productToEdit && productToEdit.mealType === t) ? "selected" : ""}>${t}</option>
                `).join("")}
              </select>
            </label>
            <label>Vegetais (opcional)
              <input type="text" name="category" value="${productToEdit ? (productToEdit.category || "") : ""}">
            </label>
            <label>Preço (USD)
              <input type="number" name="price" min="0" step="0.01" required value="${productToEdit ? (productToEdit.price ?? "") : ""}">
            </label>
            <label>Ativo na semana?
              <select name="active">
                <option value="true" ${(productToEdit && productToEdit.active === true) || !productToEdit ? "selected" : ""}>Sim</option>
                <option value="false" ${(productToEdit && productToEdit.active === false) ? "selected" : ""}>Não</option>
              </select>
            </label>
          </div>

          <button type="submit" class="btn btn-primary">${isEditing ? "Atualizar produto" : "Salvar produto"}</button>
          ${isEditing ? '<button type="button" id="btn-cancelar-edicao-produto" class="btn btn-secondary">Cancelar edição</button>' : ""}
        </form>
      </div>

      <div class="card">
        <h3>Produtos cadastrados</h3>
        ${state.products.length === 0 ? '<p class="muted">Nenhum produto cadastrado.</p>' : `
          <table>
            <thead><tr><th>Nome</th><th>Tipo</th><th>Vegetais</th><th>Preço</th><th>Ativo</th><th>Ações</th></tr></thead>
            <tbody id="produtos-tbody">
              ${state.products.map(p => `
                <tr data-id="${p.id}">
                  <td>${p.name || ""}</td>
                  <td>${p.mealType || "-"}</td>
                  <td>${p.category || ""}</td>
                  <td>${formatCurrency(p.price)}</td>
                  <td>${p.active ? "Sim" : "Não"}</td>
                  <td>
                    <button class="btn btn-secondary btn-editar-produto" type="button">Editar</button>
                    <button class="btn btn-danger btn-excluir-produto" type="button">Excluir</button>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `}
      </div>
    `;

    const form = document.getElementById("form-produto");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const data = new FormData(form);

      const payload = {
        name: (data.get("name") || "").trim(),
        mealType: data.get("mealType") || "",
        category: (data.get("category") || "").trim(),
        price: Number(data.get("price")) || 0,
        active: (data.get("active") === "true")
      };

      if (!payload.name) return alert("Nome é obrigatório.");

      if (editingProductId) {
        const idx = state.products.findIndex(p => p.id === editingProductId);
        if (idx !== -1) state.products[idx] = { ...state.products[idx], ...payload };
        editingProductId = null;
      } else {
        state.products.push({ id: generateId(), ...payload });
      }

      saveStateLocal();
      schedulePushToSupabase();
      renderCardapio();
    });

    const cancelBtn = document.getElementById("btn-cancelar-edicao-produto");
    if (cancelBtn) cancelBtn.onclick = () => { editingProductId = null; renderCardapio(); };

    const tbody = document.getElementById("produtos-tbody");
    if (tbody) {
      tbody.addEventListener("click", (e) => {
        const tr = e.target.closest("tr");
        if (!tr) return;
        const id = tr.getAttribute("data-id");

        if (e.target.classList.contains("btn-excluir-produto")) {
          if (confirm("Excluir este produto?")) {
            state.products = state.products.filter(p => p.id !== id);
            saveStateLocal();
            schedulePushToSupabase();
            renderCardapio();
          }
        }

        if (e.target.classList.contains("btn-editar-produto")) {
          editingProductId = id;
          renderCardapio();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    }
  }

  /*********************************************************************
   * PEDIDOS
   *********************************************************************/
  function renderPedidos() {
    const today = getTodayISO();
    const isEditing = editingOrderId !== null;
    const orderToEdit = isEditing ? state.orders.find(o => o.id === editingOrderId) : null;

    viewContainer.innerHTML = `
      <h2>Pedidos</h2>

      <div class="card no-print" style="margin-bottom:12px;">
        <div class="flex-row">
          <strong>Filtro:</strong>
          <button class="btn btn-secondary" id="filter-hoje">Hoje</button>
          <label style="min-width:160px;">Data específica
            <input type="date" id="filter-data" value="${today}">
          </label>
          <button class="btn btn-secondary" id="filter-aplicar">Aplicar data</button>
          <button class="btn btn-secondary" id="filter-todos">Todos</button>
        </div>
        <div class="muted mt-8" id="filter-info"></div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3>${isEditing ? "Editar pedido" : "Novo pedido"}</h3>

          <form id="form-pedido">
            <div class="form-grid">
              <label>Data
                <input type="date" name="date" value="${orderToEdit ? orderToEdit.date : today}" required>
              </label>

              <label>Cliente
                <select name="clientId" required>
                  <option value="">Selecione...</option>
                  ${state.clients.map(c => `
                    <option value="${c.id}" ${orderToEdit && orderToEdit.clientId === c.id ? "selected" : ""}>${c.name}</option>
                  `).join("")}
                </select>
              </label>

              <label>Forma de pagamento
                <select name="paymentMethod" required>
                  <option value="">Selecione...</option>
                  ${["Zelle","Venmo","Dinheiro"].map(m => `
                    <option value="${m}" ${orderToEdit && orderToEdit.paymentMethod === m ? "selected" : ""}>${m}</option>
                  `).join("")}
                </select>
              </label>

              <label>Frete (USD)
                <input type="number" name="freight" min="0" step="0.01" value="${orderToEdit ? (orderToEdit.freight || 0) : 0}">
              </label>

              <label>Desconto (USD)
                <input type="number" name="discount" min="0" step="0.01" value="${orderToEdit ? (orderToEdit.discount || 0) : 0}">
              </label>
            </div>

            <hr style="margin-top:12px;">

            <h4>Itens do pedido</h4>
            <div class="form-grid">
              <label>Produto (somente ativos)
                <select id="pedido-produto">
                  <option value="">Selecione...</option>
                  ${state.products.filter(p => p.active).map(p => `
                    <option value="${p.id}">${productLabel(p)} - ${formatCurrency(p.price)}</option>
                  `).join("")}
                </select>
              </label>
              <label>Quantidade
                <input type="number" id="pedido-quantidade" min="1" value="1">
              </label>
              <label>Obs. deste item (opcional)
                <input type="text" id="pedido-item-nota" placeholder="Ex: sem feijão, sem arroz">
              </label>
            </div>

            <button type="button" class="btn btn-secondary" id="btn-add-item">Adicionar item</button>

            <div id="lista-itens" style="margin-top:12px;"></div>

            <div style="margin-top:12px;">
              <div><strong>Subtotal: </strong><span id="subtotal-pedido-label">${formatCurrency(0)}</span></div>
              <div style="margin-top:8px;"><strong>Total do pedido: </strong><span id="total-pedido-label">${formatCurrency(0)}</span></div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:8px;">
              ${isEditing ? "Atualizar pedido" : "Salvar pedido"}
            </button>

            ${isEditing ? '<button type="button" id="btn-cancelar-edicao-pedido" class="btn btn-secondary">Cancelar edição</button>' : ""}
          </form>
        </div>

        <div class="card">
          <div class="flex-row">
            <h3 id="lista-pedidos-titulo">Pedidos</h3>
            <span class="muted" id="lista-pedidos-sub"></span>
          </div>

          <div id="lista-pedidos-metricas" class="cards-row" style="margin-top:8px;"></div>
          <div id="lista-pedidos"></div>
        </div>
      </div>
    `;

    const form = document.getElementById("form-pedido");
    const selectProduto = document.getElementById("pedido-produto");
    const inputQtd = document.getElementById("pedido-quantidade");
    const inputItemNota = document.getElementById("pedido-item-nota");
    const btnAddItem = document.getElementById("btn-add-item");
    const divListaItens = document.getElementById("lista-itens");
    const subtotalLabel = document.getElementById("subtotal-pedido-label");
    const totalLabel = document.getElementById("total-pedido-label");
    const btnCancelarEdicaoPedido = document.getElementById("btn-cancelar-edicao-pedido");

    let itensTemp = (orderToEdit && orderToEdit.items) ? JSON.parse(JSON.stringify(orderToEdit.items)) : [];

    function computeTotals() {
      const subtotal = itensTemp.reduce((s, it) => s + (it.lineTotal || 0), 0);
      const freight = Number(form.freight.value) || 0;
      const discount = Number(form.discount.value) || 0;
      const total = subtotal + freight - discount;
      subtotalLabel.textContent = formatCurrency(subtotal);
      totalLabel.textContent = formatCurrency(total);
      return { subtotal, total, freight, discount };
    }

    function atualizarListaItens() {
      if (itensTemp.length === 0) {
        divListaItens.innerHTML = '<p class="muted">Nenhum item adicionado ainda.</p>';
        computeTotals();
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Produto</th><th>Preço unitário</th><th>Qtd</th><th>Obs. item</th><th>Total</th><th></th>
            </tr>
          </thead>
          <tbody>
      `;

      itensTemp.forEach((it, idx) => {
        const prod = findProductById(it.productId);
        html += `
          <tr data-idx="${idx}">
            <td>${productLabel(prod)}</td>
            <td>${formatCurrency(it.unitPrice)}</td>
            <td><input type="number" class="item-qty" data-idx="${idx}" min="1" value="${it.quantity}"></td>
            <td>${it.itemNote || "-"}</td>
            <td>${formatCurrency(it.lineTotal)}</td>
            <td><button type="button" class="btn btn-danger btn-remover-item">Remover</button></td>
          </tr>
        `;
      });

      html += "</tbody></table>";
      divListaItens.innerHTML = html;

      computeTotals();

      const tbodyItens = divListaItens.querySelector("tbody");

      tbodyItens.onclick = (e) => {
        if (e.target.classList.contains("btn-remover-item")) {
          const tr = e.target.closest("tr");
          const idx = Number(tr.getAttribute("data-idx"));
          itensTemp.splice(idx, 1);
          atualizarListaItens();
        }
      };

      tbodyItens.onchange = (e) => {
        if (e.target.classList.contains("item-qty")) {
          const idx = Number(e.target.getAttribute("data-idx"));
          const novaQtd = Math.max(1, Number(e.target.value) || 1);
          itensTemp[idx].quantity = novaQtd;
          itensTemp[idx].lineTotal = novaQtd * itensTemp[idx].unitPrice;
          atualizarListaItens();
        }
      };
    }

    btnAddItem.addEventListener("click", () => {
      const pid = selectProduto.value;
      if (!pid) return alert("Selecione um produto ativo.");
      const prod = findProductById(pid);
      if (!prod) return alert("Produto inválido.");

      const qtd = Number(inputQtd.value) || 1;
      if (qtd <= 0) return alert("Quantidade inválida.");

      const unitPrice = Number(prod.price) || 0;
      const note = inputItemNota.value.trim();

      const existing = itensTemp.find(it => it.productId === pid && (it.itemNote || "") === note);
      if (existing) {
        existing.quantity += qtd;
        existing.lineTotal = existing.quantity * existing.unitPrice;
      } else {
        itensTemp.push({
          productId: pid,
          quantity: qtd,
          unitPrice,
          lineTotal: unitPrice * qtd,
          itemNote: note
        });
      }

      atualizarListaItens();
      inputQtd.value = 1;
      inputItemNota.value = "";
    });

    form.freight.addEventListener("input", computeTotals);
    form.discount.addEventListener("input", computeTotals);

    atualizarListaItens();

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const data = new FormData(form);
      const date = data.get("date");
      const clientId = data.get("clientId");
      const paymentMethod = data.get("paymentMethod");
      if (!paymentMethod) return alert("Selecione a forma de pagamento.");

      if (state.clients.length === 0 || state.products.length === 0) {
        return alert("Cadastre pelo menos um cliente e um produto antes.");
      }
      if (itensTemp.length === 0) return alert("Adicione itens ao pedido.");

      if (!editingOrderId) {
        const sameDay = state.orders.filter(o => o.date === date && o.clientId === clientId);
        if (sameDay.length > 0) {
          const continuar = confirm("ATENÇÃO! Já existe pedido desse cliente nessa data. Criar outro?");
          if (!continuar) return;
        }
      }

      const { subtotal, total, freight, discount } = computeTotals();
      const payload = {
        date,
        clientId,
        items: itensTemp.slice(),
        status: (orderToEdit && orderToEdit.status) ? orderToEdit.status : "A produzir",
        paymentMethod,
        freight,
        discount,
        subtotalValue: subtotal,
        totalValue: total
      };

      if (editingOrderId) {
        const idx = state.orders.findIndex(o => o.id === editingOrderId);
        if (idx !== -1) state.orders[idx] = { ...state.orders[idx], ...payload };
        editingOrderId = null;
      } else {
        state.orders.push({ id: generateId(), ...payload });
      }

      saveStateLocal();
      schedulePushToSupabase();
      renderPedidos();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    if (btnCancelarEdicaoPedido) {
      btnCancelarEdicaoPedido.addEventListener("click", () => {
        editingOrderId = null;
        renderPedidos();
      });
    }

    const filterHojeBtn = document.getElementById("filter-hoje");
    const filterTodosBtn = document.getElementById("filter-todos");
    const filterDataInput = document.getElementById("filter-data");
    const filterAplicarBtn = document.getElementById("filter-aplicar");
    const filterInfo = document.getElementById("filter-info");

    let currentFilter = { mode: "hoje", date: today };

    function getFilteredOrders() {
      if (currentFilter.mode === "todos") return state.orders.slice();
      if (currentFilter.mode === "data") return state.orders.filter(o => o.date === currentFilter.date);
      return state.orders.filter(o => o.date === today);
    }

    function renderOrdersList() {
      const pedidos = getFilteredOrders().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
      const titulo = document.getElementById("lista-pedidos-titulo");
      const sub = document.getElementById("lista-pedidos-sub");
      const metDiv = document.getElementById("lista-pedidos-metricas");
      const listDiv = document.getElementById("lista-pedidos");

      if (currentFilter.mode === "todos") {
        titulo.textContent = "Todos os pedidos";
        sub.textContent = "Mostrando histórico completo";
        filterInfo.textContent = "Filtro atual: todos";
      } else if (currentFilter.mode === "data") {
        titulo.textContent = `Pedidos de ${currentFilter.date}`;
        sub.textContent = "Mostrando apenas esta data";
        filterInfo.textContent = `Filtro atual: data ${currentFilter.date}`;
      } else {
        titulo.textContent = `Pedidos de hoje (${today})`;
        sub.textContent = "Produção do dia";
        filterInfo.textContent = "Filtro atual: hoje";
      }

      const totalMarmitas = pedidos.reduce((s, o) => s + (o.items || []).reduce((ac, it) => ac + (it.quantity || 0), 0), 0);
      const totalVendido = pedidos.reduce((s, o) => s + (o.totalValue || 0), 0);
      const ticketMedio = pedidos.length ? totalVendido / pedidos.length : 0;

      metDiv.innerHTML = `
        <div class="stat-card"><h4>Pedidos</h4><strong>${pedidos.length}</strong></div>
        <div class="stat-card"><h4>Marmitas</h4><strong>${totalMarmitas}</strong></div>
        <div class="stat-card"><h4>Total vendido</h4><strong>${formatCurrency(totalVendido)}</strong></div>
        <div class="stat-card"><h4>Ticket médio</h4><strong>${formatCurrency(ticketMedio)}</strong></div>
      `;

      if (pedidos.length === 0) {
        listDiv.innerHTML = `<p class="muted mt-12">Nenhum pedido neste filtro.</p>`;
        return;
      }

      listDiv.innerHTML = `
        <table id="pedidos-table">
          <thead>
            <tr>
              <th>Data</th><th>Cliente</th><th>Itens</th><th>Subtotal</th><th>Frete</th><th>Desconto</th><th>Total</th><th>Pagamento</th><th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${pedidos.map(o => {
              const c = findClientById(o.clientId);
              const resumo = (o.items || []).map(it => {
                const p = findProductById(it.productId);
                const obs = it.itemNote ? ` (${it.itemNote})` : "";
                return `${it.quantity}x ${productLabel(p)}${obs}`;
              }).join("<br>");

              return `
                <tr data-id="${o.id}">
                  <td>${o.date}</td>
                  <td>${c ? c.name : "-"}</td>
                  <td>${resumo || "-"}</td>
                  <td>${formatCurrency(o.subtotalValue || 0)}</td>
                  <td>${formatCurrency(o.freight || 0)}</td>
                  <td>${formatCurrency(o.discount || 0)}</td>
                  <td><strong>${formatCurrency(o.totalValue || 0)}</strong></td>
                  <td>${o.paymentMethod || ""}</td>
                  <td>
                    <button class="btn btn-secondary" type="button" data-action="edit">Editar</button>
                    <button class="btn btn-danger" type="button" data-action="delete">Excluir</button>
                  </td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;

      const tbody = listDiv.querySelector("tbody");
      tbody.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const tr = btn.closest("tr");
        const id = tr.getAttribute("data-id");
        const action = btn.getAttribute("data-action");

        if (action === "delete") {
          if (confirm("Excluir este pedido?")) {
            state.orders = state.orders.filter(o => o.id !== id);
            saveStateLocal();
            schedulePushToSupabase();
            renderOrdersList();
          }
        }

        if (action === "edit") {
          editingOrderId = id;
          renderPedidos();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    }

    filterHojeBtn.onclick = () => { currentFilter = { mode: "hoje", date: today }; renderOrdersList(); };
    filterTodosBtn.onclick = () => { currentFilter = { mode: "todos", date: null }; renderOrdersList(); };
    filterAplicarBtn.onclick = () => {
      const d = filterDataInput.value || today;
      currentFilter = { mode: "data", date: d };
      renderOrdersList();
    };

    renderOrdersList();
  }

  /*********************************************************************
   * PRODUÇÃO
   *********************************************************************/
  function renderProducao() {
    const today = getTodayISO();
    viewContainer.innerHTML = `
      <h2>Produção do dia</h2>
      <div class="card">
        <div class="form-grid">
          <label>Data
            <input type="date" id="producao-data" value="${today}">
          </label>
        </div>
        <div class="flex-row">
          <button class="btn btn-primary" id="btn-atualizar-producao">Atualizar</button>
          <button class="btn btn-secondary" id="btn-pdf-producao">Gerar PDF para cozinha</button>
          <button class="btn btn-secondary" id="btn-abrir-relatorio">Abrir relatório</button>
        </div>
        <div class="flex-row" style="margin-top:8px;">
          <span class="muted">Modo:</span>
          <button class="btn btn-secondary" id="btn-modo-completo">Completo</button>
          <button class="btn btn-secondary" id="btn-modo-resumo">Resumo + totais</button>
        </div>
        <div id="producao-resultado" style="margin-top:12px;"></div>
      </div>
    `;

    const inputData = document.getElementById("producao-data");
    const btnAtualizar = document.getElementById("btn-atualizar-producao");
    const btnPdf = document.getElementById("btn-pdf-producao");
    const btnNovaAba = document.getElementById("btn-abrir-relatorio");
    const btnModoCompleto = document.getElementById("btn-modo-completo");
    const btnModoResumo = document.getElementById("btn-modo-resumo");
    const divResultado = document.getElementById("producao-resultado");

    let modoRelatorio = "completo";

    function calcular() {
      const dataSel = inputData.value;
      const pedidosDia = state.orders.filter(o => o.date === dataSel && o.status !== "Cancelado");
      if (pedidosDia.length === 0) {
        divResultado.innerHTML = `<p class="muted">Nenhum pedido para esta data.</p>`;
        return;
      }

      const grupos = {};
      let totalGeral = 0;
      const totaisPorProduto = {};

      pedidosDia.forEach(o => {
        const client = findClientById(o.clientId);
        const clientName = client ? client.name : "(sem nome)";

        if (!grupos[o.clientId]) grupos[o.clientId] = { clientName, itens: {}, totalCliente: 0 };

        (o.items || []).forEach(it => {
          const p = findProductById(it.productId);
          const note = it.itemNote || "";
          const key = it.productId + "|" + note;
          const qty = it.quantity || 0;

          if (!grupos[o.clientId].itens[key]) {
            grupos[o.clientId].itens[key] = {
              productName: p ? p.name : "Produto",
              mealType: p ? (p.mealType || "Sem tipo") : "Sem tipo",
              veggies: p ? (p.category || "") : "",
              itemNote: note,
              qty: 0
            };
          }

          grupos[o.clientId].itens[key].qty += qty;
          grupos[o.clientId].totalCliente += qty;
          totalGeral += qty;

          if (!totaisPorProduto[it.productId]) {
            totaisPorProduto[it.productId] = { productName: p ? p.name : "Produto", totalQty: 0, obsMap: {} };
          }
          totaisPorProduto[it.productId].totalQty += qty;

          if (note) {
            if (!totaisPorProduto[it.productId].obsMap[note]) totaisPorProduto[it.productId].obsMap[note] = 0;
            totaisPorProduto[it.productId].obsMap[note] += qty;
          }
        });
      });

      const gruposArray = Object.values(grupos).sort((a, b) => a.clientName.localeCompare(b.clientName));
      const totaisProdArray = Object.values(totaisPorProduto).sort((a, b) => a.productName.localeCompare(b.productName));

      const totalClientes = gruposArray.length;
      const totalSabores = totaisProdArray.length;

      let totalComObsGeral = 0;
      totaisProdArray.forEach(tp => { totalComObsGeral += Object.values(tp.obsMap).reduce((s, qtd) => s + qtd, 0); });
      const totalSemObsGeral = totalGeral - totalComObsGeral;

      let blocosClientes = "";
      gruposArray.forEach(g => {
        const itensArray = Object.values(g.itens).sort((a, b) => a.productName.localeCompare(b.productName));
        let rows = "";
        itensArray.forEach(e => {
          rows += `
            <tr>
              <td>${e.productName}</td>
              <td>${e.mealType || "-"}</td>
              <td>${e.veggies || "-"}</td>
              <td>${e.qty}</td>
              <td>${e.itemNote || "-"}</td>
            </tr>
          `;
        });

        blocosClientes += `
          <h3 style="margin-top:16px;">${g.clientName} – Total: ${g.totalCliente}</h3>
          <table>
            <thead><tr><th>Produto</th><th>Tipo</th><th>Vegetais</th><th>Qtd</th><th>Obs</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      });

      let blocosTotaisProduto = "";
      totaisProdArray.forEach(tp => {
        const obsEntries = Object.entries(tp.obsMap);
        const obsTotal = obsEntries.reduce((s, [, qtd]) => s + qtd, 0);
        const semObsQty = tp.totalQty - obsTotal;

        let linhas = "";
        if (semObsQty > 0) linhas += `<div class="linha-sem-obs">${tp.productName}: ${semObsQty}</div>`;
        obsEntries.forEach(([nota, qtd]) => { linhas += `<div class="linha-obs">${nota}: ${qtd}</div>`; });

        blocosTotaisProduto += `
          <div class="stat-card totais-produto-card">
            <h4>${tp.productName}</h4>
            <div>${linhas || "<div>-</div>"}</div>
            <div class="totais-total">Quantidade Total: ${tp.totalQty}</div>
          </div>
        `;
      });

      let html = `
        <h3>Resumo da produção – ${dataSel}</h3>
        <div class="cards-row resumo-cards">
          <div class="stat-card"><h4>Total marmitas</h4><strong>${totalGeral}</strong></div>
          <div class="stat-card"><h4>Clientes</h4><strong>${totalClientes}</strong></div>
          <div class="stat-card"><h4>Sabores</h4><strong>${totalSabores}</strong></div>
          <div class="stat-card"><h4>Com obs</h4><strong>${totalComObsGeral}</strong><div class="muted">Sem obs: ${totalSemObsGeral}</div></div>
        </div>
      `;

      if (modoRelatorio === "completo") {
        html += `<div style="margin-top:12px;"><h3>Marmitas por cliente</h3>${blocosClientes}</div>`;
      }

      html += `
        <div style="margin-top:12px;">
          <h3>Totais por produto</h3>
          <div class="cards-row">${blocosTotaisProduto}</div>
        </div>
      `;

      divResultado.innerHTML = html;
    }

    btnAtualizar.onclick = calcular;
    btnPdf.onclick = () => window.print();
    btnNovaAba.onclick = () => {
      const dataSel = inputData.value;
      const conteudo = divResultado.innerHTML || "<p>Nenhum dado.</p>";
      const win = window.open("", "_blank");
      win.document.write(`
        <html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Relatório - ${dataSel}</title></head><body style="font-family:system-ui,sans-serif;padding:16px;">
          <h2>Relatório – ${dataSel}</h2>${conteudo}
        </body></html>
      `);
      win.document.close();
    };
    btnModoCompleto.onclick = () => { modoRelatorio = "completo"; calcular(); };
    btnModoResumo.onclick = () => { modoRelatorio = "resumo"; calcular(); };

    calcular();
  }

  /*********************************************************************
   * ENTREGAS
   *********************************************************************/
  function renderEntregas() {
    const today = getTodayISO();
    viewContainer.innerHTML = `
      <h2>Entregas do dia</h2>
      <div class="card">
        <div class="form-grid">
          <label>Data
            <input type="date" id="entregas-data" value="${today}">
          </label>
        </div>
        <button class="btn btn-primary" id="btn-atualizar-entregas">Atualizar</button>
        <div id="entregas-resultado" style="margin-top:12px;"></div>
      </div>
    `;

    const inputData = document.getElementById("entregas-data");
    const btnAtualizar = document.getElementById("btn-atualizar-entregas");
    const divResultado = document.getElementById("entregas-resultado");

    function calcular() {
      const dataSel = inputData.value;
      const pedidosDia = state.orders.filter(o => o.date === dataSel && o.status !== "Cancelado");
      if (pedidosDia.length === 0) { divResultado.innerHTML = `<p class="muted">Nenhuma entrega para esta data.</p>`; return; }

      let rows = "";
      pedidosDia.forEach(o => {
        const client = findClientById(o.clientId);
        const itensDescricao = (o.items || []).map(it => {
          const p = findProductById(it.productId);
          const obs = it.itemNote ? ` (${it.itemNote})` : "";
          return `${it.quantity}x ${productLabel(p)}${obs}`;
        }).join("<br>");

        rows += `
          <tr>
            <td>${client ? client.name : "-"}</td>
            <td>${client ? (client.address || "") : ""}</td>
            <td>${client ? (client.district || "") : ""}</td>
            <td>${client ? (client.phone || "") : ""}</td>
            <td>${client ? (client.notes || "") : ""}</td>
            <td>${itensDescricao || "-"}</td>
            <td>${o.status || ""}</td>
          </tr>
        `;
      });

      divResultado.innerHTML = `
        <h3>Entregas para ${dataSel}</h3>
        <table>
          <thead><tr><th>Cliente</th><th>Endereço</th><th>Bairro/Cidade</th><th>Telefone</th><th>Obs</th><th>Itens</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    btnAtualizar.onclick = calcular;
    calcular();
  }

  /*********************************************************************
   * FINANCEIRO
   *********************************************************************/
  function renderFinanceiro() {
    const today = getTodayISO();
    viewContainer.innerHTML = `
      <h2>Financeiro</h2>
      <div class="card">
        <div class="form-grid">
          <label>Data inicial
            <input type="date" id="fin-data-inicio">
          </label>
          <label>Data final
            <input type="date" id="fin-data-fim">
          </label>
        </div>
        <div class="flex-row">
          <button class="btn btn-primary" id="btn-atualizar-financeiro">Calcular</button>
          <button class="btn btn-secondary" id="btn-fin-hoje">Hoje (${today})</button>
          <button class="btn btn-secondary" id="btn-fin-7">Últimos 7 dias</button>
          <button class="btn btn-secondary" id="btn-fin-30">Últimos 30 dias</button>
        </div>
        <div id="financeiro-resultado" style="margin-top:12px;"></div>
      </div>
    `;

    const inputInicio = document.getElementById("fin-data-inicio");
    const inputFim = document.getElementById("fin-data-fim");
    const btnAtualizar = document.getElementById("btn-atualizar-financeiro");
    const btnHoje = document.getElementById("btn-fin-hoje");
    const btn7 = document.getElementById("btn-fin-7");
    const btn30 = document.getElementById("btn-fin-30");
    const divResultado = document.getElementById("financeiro-resultado");

    function filtrarPedidos() {
      const ini = inputInicio.value;
      const fim = inputFim.value;
      return state.orders.filter(o => {
        if (ini && o.date < ini) return false;
        if (fim && o.date > fim) return false;
        return true;
      });
    }

    function calcular() {
      const pedidos = filtrarPedidos();
      if (financeLineChart) { financeLineChart.destroy(); financeLineChart = null; }
      if (pedidos.length === 0) { divResultado.innerHTML = `<p class="muted">Nenhum pedido neste período.</p>`; return; }

      const total = pedidos.reduce((s, o) => s + (o.totalValue || 0), 0);
      const ticketMedio = pedidos.length ? total / pedidos.length : 0;

      const porMetodo = {};
      pedidos.forEach(o => {
        const m = o.paymentMethod || "Não informado";
        porMetodo[m] = (porMetodo[m] || 0) + (o.totalValue || 0);
      });

      let tabelaMetodo = "";
      Object.entries(porMetodo).forEach(([m, val]) => {
        tabelaMetodo += `<tr><td>${m}</td><td>${formatCurrency(val)}</td></tr>`;
      });

      const porCliente = {};
      pedidos.forEach(o => {
        const c = findClientById(o.clientId);
        const nome = c ? c.name : "Cliente";
        porCliente[nome] = (porCliente[nome] || 0) + (o.totalValue || 0);
      });

      const topClientes = Object.entries(porCliente).sort((a, b) => b[1] - a[1]).slice(0, 5);
      let tabelaClientes = "";
      topClientes.forEach(([n, val]) => {
        tabelaClientes += `<tr><td>${n}</td><td>${formatCurrency(val)}</td></tr>`;
      });

      const porDia = {};
      pedidos.forEach(o => { porDia[o.date] = (porDia[o.date] || 0) + (o.totalValue || 0); });
      const datasOrdenadas = Object.keys(porDia).sort();
      const valoresDia = datasOrdenadas.map(d => porDia[d]);

      divResultado.innerHTML = `
        <div class="cards-row">
          <div class="stat-card"><h4>Total vendido</h4><strong>${formatCurrency(total)}</strong></div>
          <div class="stat-card"><h4>Pedidos</h4><strong>${pedidos.length}</strong></div>
          <div class="stat-card"><h4>Ticket médio</h4><strong>${formatCurrency(ticketMedio)}</strong></div>
        </div>

        <div class="grid-2" style="margin-top:12px;">
          <div>
            <h4>Por pagamento</h4>
            <table><thead><tr><th>Método</th><th>Total</th></tr></thead><tbody>${tabelaMetodo}</tbody></table>
          </div>
          <div>
            <h4>Top clientes</h4>
            <table><thead><tr><th>Cliente</th><th>Total</th></tr></thead><tbody>${tabelaClientes}</tbody></table>
          </div>
        </div>

        <div style="margin-top:12px;">
          <h4>Evolução diária</h4>
          <canvas id="chart-finance"></canvas>
        </div>
      `;

      if (typeof Chart !== "undefined") {
        const ctxFin = document.getElementById("chart-finance").getContext("2d");
        financeLineChart = new Chart(ctxFin, {
          type: "line",
          data: { labels: datasOrdenadas, datasets: [{ data: valoresDia }] },
          options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
      }
    }

    btnAtualizar.onclick = calcular;
    btnHoje.onclick = () => { inputInicio.value = today; inputFim.value = today; calcular(); };
    btn7.onclick = () => { inputInicio.value = addDaysISO(today, -6); inputFim.value = today; calcular(); };
    btn30.onclick = () => { inputInicio.value = addDaysISO(today, -29); inputFim.value = today; calcular(); };

    // default: últimos 7 dias
    inputInicio.value = addDaysISO(today, -6);
    inputFim.value = today;
    calcular();
  }

  /*********************************************************************
   * BOOT
   *********************************************************************/
  (async function boot() {
    loadStateLocal();
    ensureSeedClients();
    saveStateLocal();

    await initSupabase();
    await syncFromSupabase();

    renderView("dashboard");
  })();
</script>
